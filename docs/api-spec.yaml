openapi: 3.0.3
info:
  title: Banks API
  description: REST API for the Banks web banking application
  version: 0.1.0
servers:
  - url: http://localhost:3000/api/v1
    description: Local development server
paths:
  /auth/register:
    post:
      summary: Register a new user
      description: |
        Creates a new user account in inactive status and triggers an OTP
        to be sent to the user's email or phone for verification.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created, OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Invalid email or phone format
        '409':
          description: Email already registered

  /auth/verify-otp:
    post:
      summary: Verify OTP and activate account
      description: |
        Submits the 6-digit code sent during registration. On success, marks
        the user as active, assigns a starting balance, and returns a JWT.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '200':
          description: OTP verified, user activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Malformed request
        '401':
          description: Incorrect or expired OTP
        '404':
          description: No pending registration found for this email

  /auth/login:
    post:
      summary: User login
      description: |
        Verifies the user's email and password. On success, returns a
        JWT to be used as a Bearer token in the Authorization header
        for subsequent requests.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Malformed request
        '401':
          description: Incorrect email or password

  /auth/logout:
    post:
      summary: Log out
      description: |
        Invalidates the current JWT (server-side blacklist). After this,
        the same token can no longer be used to access protected endpoints.
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Logged out successfully
        '401':
          description: Missing or invalid token

  /users/me:
    get:
      summary: Get my profile
      description: Returns the authenticated user's profile and current balance.
      tags:
        - Users
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Missing or invalid token

  /transactions:
    get:
      summary: List my transactions
      description: |
        Returns the authenticated user's transaction history, newest first,
        in pages of configurable size.
      tags:
        - Transactions
      security:
        - BearerAuth: [ ]
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number, starting at 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Page size (max 100)
      responses:
        '200':
          description: Paginated list of transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTransactions'
        '400':
          description: Invalid pagination parameters
        '401':
          description: Missing or invalid token

    post:
      summary: Send money to another user
      description: |
        Transfers the specified amount from the authenticated user's
        balance to the recipient's balance. Operation is atomic.
      tags:
        - Transactions
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '201':
          description: Transfer completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          description: Malformed request
        '401':
          description: Missing or invalid token
        '404':
          description: Recipient email not found
        '422':
          description: Insufficient balance, or attempting to transfer to self

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT obtained from /auth/login or /auth/verify-otp. Send as:
        Authorization: Bearer <token>

  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - phone
      properties:
        email:
          type: string
          format: email
          example: saar@example.com
        password:
          type: string
          minLength: 8
          example: SuperSecret123
        phone:
          type: string
          pattern: '^\+?[0-9]{9,15}$'
          example: '+972501234567'

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
          example: User registered. OTP sent.
        userId:
          type: string
          example: 64a1b2c3d4e5f6a7b8c9d0e1

    VerifyOtpRequest:
      type: object
      required:
        - email
        - otp
      properties:
        email:
          type: string
          format: email
          example: saar@example.com
        otp:
          type: string
          pattern: '^[0-9]{6}$'
          example: '123456'

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: saar@example.com
        password:
          type: string
          example: SuperSecret123

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT to be sent in the Authorization header on subsequent requests
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: '#/components/schemas/UserProfile'

    UserProfile:
      type: object
      properties:
        id:
          type: string
          example: 64a1b2c3d4e5f6a7b8c9d0e1
        email:
          type: string
          format: email
          example: saar@example.com
        balance:
          type: string
          description: Decimal128 string representation
          example: '1000.00'

    TransferRequest:
      type: object
      required:
        - recipientEmail
        - amount
      properties:
        recipientEmail:
          type: string
          format: email
          example: jane@example.com
        amount:
          type: string
          description: Decimal string, must be positive
          example: '50.00'

    Transaction:
      type: object
      properties:
        id:
          type: string
          example: 64a1b2c3d4e5f6a7b8c9d0e2
        senderEmail:
          type: string
          format: email
          example: saar@example.com
        recipientEmail:
          type: string
          format: email
          example: jane@example.com
        amount:
          type: string
          example: '50.00'
        createdAt:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'

    PaginatedTransactions:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        page:
          type: integer
          example: 2
        limit:
          type: integer
          example: 20
        totalItems:
          type: integer
          example: 87
        totalPages:
          type: integer
          example: 5
        hasNext:
          type: boolean
          example: true
        hasPrev:
          type: boolean
          example: true